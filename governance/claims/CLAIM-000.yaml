text: |
  The EGBOS governance infrastructure is operational. govcheck compiles,
  passes its own test suite under ASAN/TSAN/UBSAN, validates claim schemas,
  builds dependency graphs, detects cycles, verifies proof artifact integrity,
  and enforces ownership constraints. CI gates C0, P1, and P2 are active
  and blocking on all pull requests.
